        // Initialize virtual file system with links
        function initializeFileSystem() {
            generativeSystemLinks.forEach(link => {
                const parts = link.path.split('/');
                let currentDir = virtualFileSystem['/reberagent/reber'];
                let fullPath = '/reberagent/reber';
                
                for (let i = 1; i < parts.length; i++) {
                    const part = parts[i];
                    fullPath += '/' + part;
                    
                    if (i === parts.length - 1) {
                        // This is a file
                        currentDir.children[part] = {
                            type: 'file',
                            path: link.path,
                            desc: link.desc,
                            content: `// ${link.desc}\n// Path: ${link.path}\n// Generated by Reber System\n`
                        };
                    } else {
                        // This is a directory
                        if (!currentDir.children[part]) {
                            currentDir.children[part] = {
                                type: 'directory',
                                children: {}
                            };
                        }
                        currentDir = currentDir.children[part];
                    }
                }
            });
        }

        // Terminal output functions
        function printLine(text, className = '') {
            const output = document.getElementById('terminal-output');
            const line = document.createElement('div');
            line.textContent = text;
            if (className) line.className = className;
            output.appendChild(line);
            scrollToBottom();
        }

        function printHTML(html) {
            const output = document.getElementById('terminal-output');
            const line = document.createElement('div');
            line.innerHTML = html;
            output.appendChild(line);
            scrollToBottom();
        }

        function scrollToBottom() {
            const container = document.getElementById('terminal-container');
            container.scrollTop = container.scrollHeight;
        }

        function resolvePath(path) {
            if (path.startsWith('/')) {
                return path;
            }
            if (path === '.') {
                return currentPath;
            }
            if (path === '..') {
                const parts = currentPath.split('/');
                parts.pop();
                return parts.join('/') || '/';
            }
            return currentPath + '/' + path;
        }

        function getDirectoryAtPath(path) {
            const parts = path.split('/').filter(p => p);
            let current = virtualFileSystem['/reberagent/reber'];
            
            for (let i = 1; i < parts.length; i++) {
                const part = parts[i];
                if (!current.children || !current.children[part]) {
                    return null;
                }
                current = current.children[part];
            }
            return current;
        }

        function getFileAtPath(path) {
            const parts = path.split('/').filter(p => p);
            let current = virtualFileSystem['/reberagent/reber'];
            
            for (let i = 1; i < parts.length - 1; i++) {
                const part = parts[i];
                if (!current.children || !current.children[part]) {
                    return null;
                }
                current = current.children[part];
            }
            
            const fileName = parts[parts.length - 1];
            return current.children[fileName] || null;
        }

        function createDirectory(path) {
            const parts = path.split('/').filter(p => p);
            let current = virtualFileSystem['/reberagent/reber'];
            
            for (let i = 1; i < parts.length; i++) {
                const part = parts[i];
                if (!current.children[part]) {
                    current.children[part] = {
                        type: 'directory',
                        children: {}
                    };
                }
                current = current.children[part];
            }
        }

        function createFile(path, content = '') {
            const parts = path.split('/').filter(p => p);
            let current = virtualFileSystem['/reberagent/reber'];
            
            for (let i = 1; i < parts.length - 1; i++) {
                const part = parts[i];
                if (!current.children[part]) {
                    return false;
                }
                current = current.children[part];
            }
            
            const fileName = parts[parts.length - 1];
            current.children[fileName] = {
                type: 'file',
                content: content,
                path: path,
                desc: 'User created file'
            };
            return true;
        }

        function deleteItem(path) {
            const parts = path.split('/').filter(p => p);
            let current = virtualFileSystem['/reberagent/reber'];
            
            for (let i = 1; i < parts.length - 1; i++) {
                const part = parts[i];
                if (!current.children[part]) {
                    return false;
                }
                current = current.children[part];
            }
            
            const itemName = parts[parts.length - 1];
            if (current.children[itemName]) {
                delete current.children[itemName];
                return true;
            }
            return false;
        }

        function listDirectory(path) {
            const dir = getDirectoryAtPath(path);
            if (!dir || dir.type !== 'directory') {
                return null;
            }
            return Object.entries(dir.children).map(([name, item]) => ({
                name,
                type: item.type,
                desc: item.desc || ''
            }));
        }

        // Command processor
        function processCommand(command) {
            const trimmed = command.trim();
            if (!trimmed) return;

            commandHistory.push(trimmed);
            historyIndex = commandHistory.length;

            const parts = trimmed.split(/\s+/);
            const cmd = parts[0].toLowerCase();
            const args = parts.slice(1);

            printLine(`root@reber:${currentPath}$ ${trimmed}`, 'info');

            switch (cmd) {
                case 'help':
                    printLine('\n=== REBER TERMINAL COMMANDS ===', 'info');
                    printLine('ls [path]              - List directory contents', 'help-text');
                    printLine('cd <path>              - Change directory', 'help-text');
                    printLine('pwd                    - Print working directory', 'help-text');
                    printLine('mkdir <name>           - Create new directory', 'help-text');
                    printLine('touch <filename>       - Create new file', 'help-text');
                    printLine('cat <filename>         - Display file content', 'help-text');
                    printLine('rm <path>              - Remove file or directory', 'help-text');
                    printLine('echo <text>            - Print text to output', 'help-text');
                    printLine('find <pattern>         - Search for files', 'help-text');
                    printLine('tree                   - Display directory tree', 'help-text');
                    printLine('links                  - Show all system links', 'help-text');
                    printLine('clear                  - Clear terminal screen', 'help-text');
                    printLine('status                 - Show system status', 'help-text');
                    printLine('info                   - Show system information', 'help-text');
                    break;

                case 'clear':
                    document.getElementById('terminal-output').innerHTML = '';
                    break;

                case 'pwd':
                    printLine(currentPath, 'directory');
                    break;

                case 'ls':
                    const listPath = args[0] ? resolvePath(args[0]) : currentPath;
                    const items = listDirectory(listPath);
                    if (items === null) {
                        printLine(`Error: Directory not found: ${listPath}`, 'error');
                    } else if (items.length === 0) {
                        printLine('(empty directory)', 'help-text');
                    } else {
                        items.forEach(item => {
                            const icon = item.type === 'directory' ? '📁' : '📄';
                            const className = item.type === 'directory' ? 'directory' : 'file';
                            printLine(`${icon} ${item.name}${item.desc ? ' - ' + item.desc : ''}`, className);
                        });
                    }
                    break;

                case 'cd':
                    if (!args[0]) {
                        currentPath = '/reberagent/reber';
                    } else {
                        const newPath = resolvePath(args[0]);
                        const dir = getDirectoryAtPath(newPath);
                        if (dir && dir.type === 'directory') {
                            currentPath = newPath;
                        } else {
                            printLine(`Error: Directory not found: ${newPath}`, 'error');
                        }
                    }
                    updatePrompt();
                    break;

                case 'mkdir':
                    if (!args[0]) {
                        printLine('Usage: mkdir <directory_name>', 'error');
                    } else {
                        const newDirPath = currentPath + '/' + args[0];
                        createDirectory(newDirPath);
                        printLine(`Directory created: ${newDirPath}`, 'success');
                    }
                    break;

                case 'touch':
                    if (!args[0]) {
                        printLine('Usage: touch <filename>', 'error');
                    } else {
                        const newFilePath = currentPath + '/' + args[0];
                        if (createFile(newFilePath)) {
                            printLine(`File created: ${newFilePath}`, 'success');
                        } else {
                            printLine(`Error: Cannot create file at ${newFilePath}`, 'error');
                        }
                    }
                    break;

                case 'cat':
                    if (!args[0]) {
                        printLine('Usage: cat <filename>', 'error');
                    } else {
                        const filePath = resolvePath(args[0]);
                        const file = getFileAtPath(filePath);
                        if (file && file.type === 'file') {
                            printLine(file.content || '(empty file)', 'file');
                        } else {
                            printLine(`Error: File not found: ${filePath}`, 'error');
                        }
                    }
                    break;

                case 'rm':
                    if (!args[0]) {
                        printLine('Usage: rm <path>', 'error');
                    } else {
                        const removePath = resolvePath(args[0]);
                        if (deleteItem(removePath)) {
                            printLine(`Removed: ${removePath}`, 'success');
                        } else {
                            printLine(`Error: Cannot remove ${removePath}`, 'error');
                        }
                    }
                    break;

                case 'echo':
                    printLine(args.join(' '));
                    break;

                case 'find':
                    if (!args[0]) {
                        printLine('Usage: find <pattern>', 'error');
                    } else {
                        const pattern = args[0].toLowerCase();
                        let found = false;
                        generativeSystemLinks.forEach(link => {
                            if (link.path.toLowerCase().includes(pattern)) {
                                printLine(`📄 ${link.path} - ${link.desc}`, 'system-link');
                                found = true;
                            }
                        });
                        if (!found) {
                            printLine(`No files found matching: ${pattern}`, 'help-text');
                        }
                    }
                    break;

                case 'tree':
                    printLine('/reberagent/reber', 'directory');
                    function printTree(dir, prefix = '├── ', depth = 0) {
                        if (depth > 3) return;
                        const entries = Object.entries(dir.children);
                        entries.forEach(([name, item], index) => {
                            const isLast = index === entries.length - 1;
                            const connector = isLast ? '└── ' : '├── ';
                            const icon = item.type === 'directory' ? '📁' : '📄';
                            const className = item.type === 'directory' ? 'directory' : 'file';
                            printLine(`${prefix}${connector}${icon} ${name}`, className);
                            if (item.type === 'directory' && depth < 2) {
                                printTree(item, prefix + (isLast ? '    ' : '│   '), depth + 1);
                            }
                        });
                    }
                    const rootDir = virtualFileSystem['/reberagent/reber'];
                    printTree(rootDir);
                    break;

                case 'links':
                    printLine(`\n=== ${generativeSystemLinks.length} SISTEM LINK GENERATIF ===`, 'info');
                    generativeSystemLinks.forEach((link, index) => {
                        printLine(`${index + 1}. 📄 ${link.path}`, 'system-link');
                        printLine(`   ${link.desc}`, 'help-text');
                    });
                    break;

                case 'status':
                    printLine('\n=== STATUS SISTEM REBER ===', 'success');
                    printLine(` Direktori Aktif: ${currentPath}`, 'info');
                    printLine(` Total Link Sistem: ${generativeSystemLinks.length}`, 'info');
                    printLine(` Status: ONLINE`, 'success');
                    printLine(` Mode: CRUD Terminal Aktif`, 'info');
                    break;

                case 'info':
                    printLine('\n╔══════════════════════════════════════════════════╗', 'info');
                    printLine('║     REBER - SISTEM INTEGRASI SUMBER KODE AKTIF    ║', 'info');
                    printLine('╠══════════════════════════════════════════════════╣', 'info');
                    printLine('║  Fungsi: CRUD (Create, Read, Update, Delete)     ║', 'info');
                    printLine('║  Direktori: /reberagent/reber                    ║', 'info');
                    printLine('║  Link Sistem: 500+ Generatif                     ║', 'info');
                    printLine('║  Status: Terminal Interaktif Aktif               ║', 'info');
                    printLine('╚══════════════════════════════════════════════════╝', 'info');
                    break;

                default:
                    printLine(`Command not found: ${cmd}. Type 'help' for available commands.`, 'error');
            }
        }

        function updatePrompt() {
            const prompt = document.querySelector('.prompt');
            prompt.textContent = `root@reber:${currentPath}$`;
        }

        // Event listeners
        document.getElementById('command-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                processCommand(this.value);
                this.value = '';
            }
        });

        document.getElementById('command-input').addEventListener('keydown', function(e) {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    this.value = commandHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    this.value = commandHistory[historyIndex];
                } else {
                    historyIndex = commandHistory.length;
                    this.value = '';
                }
            }
        });

        // Click on links to interact
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('link-item')) {
                const path = e.target.getAttribute('data-path');
                if (path) {
                    processCommand(`cat ${path}`);
                }
            }
        });
